<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>You Jump I Jump</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; touch-action: none; background-color: #111827; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        /* 自訂滑動列樣式 */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: #3b82f6; cursor: pointer; margin-top: -9px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); border: 2px solid white; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; cursor: pointer; background: #e2e8f0; border-radius: 4px; box-shadow: inset 0 1px 2px rgba(0,0,0,0.1); }
        input[type=range]:focus { outline: none; }
        
        /* 超強文字邊框 */
        .text-outline {
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }
    </style>
</head>
<body class="w-screen h-screen flex items-center justify-center relative select-none">

    <!-- Game Canvas -->
    <canvas id="gameCanvas" width="400" height="600" class="max-w-full max-h-full aspect-[2/3] object-contain bg-white shadow-2xl"></canvas>

    <!-- UI Overlay Layer -->
    <div id="ui-layer" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none z-10">
        
        <!-- Language Toggle Button -->
        <button id="btn-lang" class="hidden pointer-events-auto absolute top-4 left-4 bg-white/80 backdrop-blur text-gray-700 px-3 py-1 rounded-full text-sm font-bold shadow-md border border-gray-200 hover:bg-gray-100 transition-colors z-20">
            🌐 EN / 中
        </button>

        <!-- Q版巨型設定按鈕 -->
        <button id="btn-settings-toggle" class="hidden pointer-events-auto absolute top-4 right-4 bg-gradient-to-br from-blue-400 to-blue-600 text-white w-14 h-14 rounded-full text-3xl font-extrabold shadow-[0_4px_15px_rgba(0,0,0,0.3)] border-4 border-white hover:scale-110 active:scale-95 transition-all z-20 flex items-center justify-center">
            ⚙️
        </button>

        <!-- HUD -->
        <div id="hud" class="hidden absolute top-0 left-0 w-full max-w-md mx-auto h-full pointer-events-none flex-col justify-start p-4 z-10">
            <div class="flex justify-between items-start w-full">
                <div class="text-left text-white flex flex-col text-outline drop-shadow-md" id="hud-left">
                    <span class="text-2xl font-extrabold tracking-wide"><span data-i18n="score">Score</span>: <span id="hud-score">0</span></span>
                    <span id="hud-lives" class="flex mt-1 items-center"></span>
                </div>
                <div class="text-right text-yellow-400 flex flex-col text-outline drop-shadow-md" id="hud-right">
                    <span class="text-2xl font-extrabold tracking-wide"><span data-i18n="coins">Coins</span>: <span id="hud-coins">0</span></span>
                </div>
            </div>
        </div>

        <!-- Settings Menu -->
        <div id="settings-menu" class="hidden pointer-events-auto absolute bg-white/95 p-6 rounded-3xl shadow-2xl text-center w-72 backdrop-blur-md z-30 border border-gray-100">
            <h2 class="text-2xl font-extrabold mb-4 text-gray-800" data-i18n="settings_title">Settings</h2>
            
            <div class="mb-5 text-left">
                <p class="font-bold text-gray-700 mb-2 text-sm" data-i18n="control_type">Control Method:</p>
                <div class="flex bg-gray-200 rounded-lg p-1">
                    <button id="ctrl-gyro" class="flex-1 py-2 text-sm font-bold text-gray-500 hover:text-gray-700 transition-colors bg-transparent" data-i18n="ctrl_gyro">📱 Gyro</button>
                    <button id="ctrl-touch" class="flex-1 py-2 text-sm font-bold bg-blue-500 text-white rounded shadow transition-colors" data-i18n="ctrl_touch">👆 Touch</button>
                </div>
            </div>

            <div id="gyro-settings" class="mb-6 text-left">
                <div class="flex justify-between items-end mb-2">
                    <p id="sens-label" class="font-bold text-gray-700 text-sm" data-i18n="touch_sens">Touch Sensitivity:</p>
                    <span id="sens-val" class="text-xs font-bold text-blue-500 bg-blue-50 px-2 py-1 rounded">1.0x</span>
                </div>
                <input type="range" id="slider-sens" min="0.5" max="5.0" step="0.1" value="1.0" class="w-full">
                <div class="flex justify-between text-xs text-gray-400 mt-1 font-semibold">
                    <span data-i18n="sens_low">Slow</span>
                    <span data-i18n="sens_high">Fast</span>
                </div>
            </div>

            <button id="btn-settings-close" class="bg-gray-800 text-white px-6 py-3 rounded-xl font-bold hover:bg-gray-700 w-full shadow transform active:scale-95 transition-transform" data-i18n="btn_done">Done</button>
        </div>

        <!-- Main Menu -->
        <div id="main-menu" class="pointer-events-auto bg-white/95 p-8 rounded-3xl shadow-xl text-center w-80 backdrop-blur-sm transition-all flex flex-col z-20">
            <h1 class="text-4xl font-extrabold mb-2 text-green-500 drop-shadow-sm" data-i18n="title">You Jump I Jump</h1>
            <p class="text-gray-500 mb-6 text-sm font-semibold" id="menu-subtitle" data-i18n="subtitle_touch">Tap sides to move, Auto-shoots!</p>
            <button id="btn-start" class="bg-green-500 text-white px-6 py-3 rounded-2xl text-xl font-bold hover:bg-green-600 w-full mb-3 shadow-lg transform active:scale-95 transition-transform" data-i18n="play">Play Game</button>
            <button id="btn-store" class="bg-purple-500 text-white px-6 py-3 rounded-2xl text-xl font-bold hover:bg-purple-600 w-full shadow-lg transform active:scale-95 transition-transform" data-i18n="store_btn">Store</button>
        </div>

        <!-- Store Menu -->
        <div id="store-menu" class="hidden pointer-events-auto bg-white/95 p-5 sm:p-6 rounded-3xl shadow-xl text-center w-[90%] max-w-sm max-h-[85vh] sm:max-h-[80vh] flex flex-col backdrop-blur-sm z-20">
            <h2 class="text-3xl font-extrabold mb-1 text-gray-800 flex-shrink-0" data-i18n="store_title">Store</h2>
            <p class="text-yellow-500 font-bold mb-3 text-lg flex-shrink-0"><span data-i18n="your_coins">Your Coins</span>: <span id="store-coins">0</span></p>
            
            <div class="flex justify-between items-center bg-blue-50 border border-blue-200 p-3 rounded-xl mb-3 shadow-sm flex-shrink-0">
                <div class="text-left flex flex-col">
                    <span class="font-bold text-blue-800 text-sm sm:text-base" data-i18n="store_extra_life">Extra Life 💖</span>
                    <span class="text-xs text-blue-600 font-semibold"><span data-i18n="owned">Owned: </span><span id="store-lives-count">0</span></span>
                </div>
                <button id="btn-buy-life" class="bg-yellow-400 hover:bg-yellow-500 text-yellow-900 px-3 py-1 rounded-full font-bold text-xs sm:text-sm shadow-sm flex-shrink-0" onclick="window.buyExtraLife()">
                    <span data-i18n="buy">Buy</span> 1000 🪙
                </button>
            </div>

            <div class="flex bg-gray-200 rounded-lg p-1 mb-2 flex-shrink-0">
                <button id="tab-chars" class="flex-1 py-1 text-sm font-bold bg-white rounded shadow text-purple-600" data-i18n="tab_chars">Characters</button>
                <button id="tab-accs" class="flex-1 py-1 text-sm font-bold text-gray-500 hover:text-gray-700" data-i18n="tab_accs">Accessories</button>
            </div>

            <div id="store-items" class="flex flex-col gap-3 mb-3 overflow-y-auto flex-1 min-h-0 p-1"></div>
            
            <button id="btn-store-back" class="bg-gray-500 text-white px-6 py-3 rounded-2xl font-bold hover:bg-gray-600 w-full shadow-lg transform active:scale-95 transition-transform mt-auto flex-shrink-0" data-i18n="back">Back to Menu</button>
        </div>

        <!-- Revive Prompt Menu -->
        <div id="revive-menu" class="hidden pointer-events-auto bg-white/95 p-8 rounded-3xl shadow-xl text-center w-80 backdrop-blur-sm flex flex-col border-4 border-yellow-400 z-20">
            <h2 class="text-3xl font-extrabold mb-2 text-yellow-500" data-i18n="revive_title">Revive?</h2>
            <p class="text-gray-600 font-bold mb-6" data-i18n="revive_desc">Keep going and beat your high score!</p>
            
            <button id="btn-revive-use" class="hidden bg-blue-500 text-white px-6 py-3 rounded-2xl text-lg font-bold hover:bg-blue-600 w-full mb-3 shadow-lg transform active:scale-95 transition-transform">
                <span data-i18n="btn_use_life">Use Extra Life</span> (<span id="revive-owned-count">0</span>)
            </button>
            
            <button id="btn-revive-buy" class="bg-yellow-400 text-yellow-900 px-6 py-3 rounded-2xl text-lg font-bold hover:bg-yellow-500 w-full mb-3 shadow-lg transform active:scale-95 transition-transform">
                <span data-i18n="btn_buy_life">Buy Revive (1000 🪙)</span>
            </button>
            
            <button id="btn-revive-skip" class="bg-gray-400 text-white px-6 py-3 rounded-2xl text-lg font-bold hover:bg-gray-500 w-full shadow-lg transform active:scale-95 transition-transform" data-i18n="btn_skip_revive">Skip</button>
        </div>

        <!-- Game Over Menu -->
        <div id="game-over-menu" class="hidden pointer-events-auto bg-white/95 p-8 rounded-3xl shadow-xl text-center w-80 backdrop-blur-sm flex flex-col z-20">
            <h2 class="text-4xl font-extrabold mb-2 text-red-500" data-i18n="game_over">Game Over!</h2>
            <p class="text-2xl font-bold mb-1 text-gray-800"><span data-i18n="score">Score</span>: <span id="go-score">0</span></p>
            <p class="text-lg text-gray-500 font-bold mb-6"><span data-i18n="best">Best</span>: <span id="go-highscore">0</span></p>
            
            <button id="btn-share" class="bg-blue-500 text-white px-6 py-3 rounded-2xl text-xl font-bold hover:bg-blue-600 w-full mb-3 shadow-lg transform active:scale-95 transition-transform flex items-center justify-center gap-2">
                <span data-i18n="share">Share Score</span> 📸
            </button>
            
            <button id="btn-restart" class="bg-green-500 text-white px-6 py-3 rounded-2xl text-xl font-bold hover:bg-green-600 w-full mb-3 shadow-lg transform active:scale-95 transition-transform" data-i18n="play_again">Play Again</button>
            <button id="btn-menu" class="bg-gray-500 text-white px-6 py-3 rounded-2xl text-xl font-bold hover:bg-gray-600 w-full shadow-lg transform active:scale-95 transition-transform" data-i18n="main_menu">Main Menu</button>
        </div>
    </div>

    <script type="module">
        // --- i18n Dictionary ---
        const i18n = {
            en: {
                title: "You Jump I Jump", subtitle_gyro: "Tilt to move, Auto-shoots!", subtitle_touch: "Tap sides to move, Auto-shoots!", 
                play: "Play Game", store_btn: "Store",
                score: "Score", coins: "Coins", store_title: "Store", your_coins: "Your Coins",
                back: "Back to Menu", game_over: "Game Over!", best: "Best", play_again: "Play Again", main_menu: "Main Menu",
                tab_chars: "Characters", tab_accs: "Accessories", equipped: "Equipped", equip: "Equip", buy: "Buy", unequip: "Unequip",
                share: "Share Score", share_text: "I scored {score} points in You Jump I Jump! Can you beat me?",
                store_extra_life: "Extra Life 💖", owned: "Owned: ", revive_title: "Revive?", revive_desc: "You fell! Spend 1000 coins to revive?",
                btn_use_life: "Use Extra Life", btn_buy_life: "Buy Revive (1000 🪙)", btn_skip_revive: "Skip & End Game",
                settings_title: "Settings", control_type: "Control Method:", ctrl_gyro: "📱 Gyro", ctrl_touch: "👆 Touch",
                gyro_sens: "Gyro Sensitivity:", touch_sens: "Touch Sensitivity:", sens_low: "Slow", sens_high: "Fast", btn_done: "Done",
                w_pellet: "Pellets (1 DMG)", w_orb: "Orbs (2 DMG)", w_shuriken: "Shurikens (2 DMG)", w_acid: "Acid (4 DMG)",
                w_heart: "Homing Hearts (2 DMG)", w_laser: "Auto-Lasers (3 DMG)", w_gold: "Homing Gold (5 DMG)", w_wind: "Wind Gusts (3 DMG)", w_plasma: "Plasma (4 DMG, Fast)",
                c_alien: "Green Alien", c_ghost: "Spooky Ghost", c_ninja: "Ninja", c_slime: "Sludge Slime", c_pinky: "Pinky", c_cyborg: "Cyborg", c_gold: "Golden King", c_flyer: "Super Fly", c_astronaut: "Astronaut (Rocket 5s)",
                a_none: "Remove All Accessories", a_cap: "Red Cap (1 Enemy Shield)", a_glasses: "Sunglasses (Cool)", a_star: "Star Clip (Cute)", a_gloves: "White Gloves (1 Bomb Shield)", a_shoes: "Sports Shoes (Springs 5s)"
            },
            zh: {
                title: "You Jump I Jump", subtitle_gyro: "傾斜手機移動，自動瞄準射擊！", subtitle_touch: "點擊左右移動，自動瞄準射擊！", 
                play: "開始遊戲", store_btn: "商店",
                score: "分數", coins: "金幣", store_title: "商店", your_coins: "你的金幣",
                back: "返回主選單", game_over: "遊戲結束！", best: "最高分", play_again: "再玩一次", main_menu: "返回主選單",
                tab_chars: "角色", tab_accs: "飾品", equipped: "已裝備", equip: "裝備", buy: "購買", unequip: "卸下",
                share: "分享分數", share_text: "我在 You Jump I Jump 拿了 {score} 分！你能打敗我嗎？",
                store_extra_life: "後備生命 💖", owned: "擁有: ", revive_title: "復活繼續？", revive_desc: "跌親添！要唔要用 1000 金幣復活繼續破紀錄？",
                btn_use_life: "使用後備生命", btn_buy_life: "購買復活 (1000 🪙)", btn_skip_revive: "放棄並結算",
                settings_title: "遊戲設定", control_type: "控制方式：", ctrl_gyro: "📱 陀螺儀", ctrl_touch: "👆 觸控",
                gyro_sens: "陀螺儀靈敏度：", touch_sens: "觸控靈敏度：", sens_low: "遲鈍", sens_high: "極速", btn_done: "完成",
                w_pellet: "小豆豆 (1 傷害)", w_orb: "幽靈光球 (2 傷害)", w_shuriken: "高速飛鏢 (2 傷害)", w_acid: "強酸液 (4 傷害)",
                w_heart: "追蹤愛心 (2 傷害)", w_laser: "自動雷射 (3 傷害)", w_gold: "追蹤金幣 (5 傷害)", w_wind: "風刃 (3 傷害)", w_plasma: "等離子炮 (4 傷害)",
                c_alien: "綠色外星人", c_ghost: "幽靈", c_ninja: "忍者", c_slime: "史萊姆", c_pinky: "粉紅甜心", c_cyborg: "生化人", c_gold: "黃金國王", c_flyer: "飛行俠 (可飛)", c_astronaut: "太空人 (火箭 5秒)",
                a_none: "一鍵卸下所有飾品", a_cap: "紅帽子 (擋 1 次敵人)", a_glasses: "太陽眼鏡 (純粹有型)", a_star: "星星髮夾 (純粹可愛)", a_gloves: "白手套 (擋 1 次炸彈)", a_shoes: "運動鞋 (跳跳鞋 5秒)"
            }
        };
        let currentLang = 'zh';

        function updateLangUI() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[currentLang][key]) el.innerText = i18n[currentLang][key];
            });
            const subKey = playerData.controlMethod === 'touch' ? 'subtitle_touch' : 'subtitle_gyro';
            document.getElementById('menu-subtitle').innerText = i18n[currentLang][subKey];
            
            const sensLabel = document.getElementById('sens-label');
            if (sensLabel) {
                sensLabel.innerText = playerData.controlMethod === 'gyro' ? i18n[currentLang].gyro_sens : i18n[currentLang].touch_sens;
            }
            if (state === 'STORE') updateStoreUI();
        }

        document.getElementById('btn-lang').addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            updateLangUI();
        });

        // --- Store Configuration ---
        const CHARACTERS = [
            { id: 'default', nameKey: 'c_alien', price: 0, color: '#84cc16', weaponKey: 'w_pellet', dmg: 1, cooldown: 35, speed: 12, type: 'pellet', homing: false, homingStrength: 0 }, 
            { id: 'ghost', nameKey: 'c_ghost', price: 50, color: '#e5e7eb', weaponKey: 'w_orb', dmg: 2, cooldown: 30, speed: 10, type: 'orb', homing: false, homingStrength: 0 }, 
            { id: 'ninja', nameKey: 'c_ninja', price: 80, color: '#1f2937', weaponKey: 'w_shuriken', dmg: 2, cooldown: 18, speed: 16, type: 'shuriken', homing: false, homingStrength: 0 }, 
            { id: 'slime', nameKey: 'c_slime', price: 120, color: '#10b981', weaponKey: 'w_acid', dmg: 4, cooldown: 45, speed: 8, type: 'acid', homing: false, homingStrength: 0 }, 
            { id: 'pinky', nameKey: 'c_pinky', price: 180, color: '#ec4899', weaponKey: 'w_heart', dmg: 2, cooldown: 25, speed: 12, type: 'heart', homing: true, homingStrength: 0.05 }, 
            { id: 'cyborg', nameKey: 'c_cyborg', price: 250, color: '#6366f1', weaponKey: 'w_laser', dmg: 3, cooldown: 12, speed: 20, type: 'laser', homing: true, homingStrength: 0.1 }, 
            { id: 'flyer', nameKey: 'c_flyer', price: 350, color: '#06b6d4', weaponKey: 'w_wind', dmg: 3, cooldown: 25, speed: 14, type: 'wind', homing: true, homingStrength: 0.08 },
            { id: 'gold', nameKey: 'c_gold', price: 500, color: '#eab308', weaponKey: 'w_gold', dmg: 5, cooldown: 20, speed: 15, type: 'gold', homing: true, homingStrength: 0.15 },
            { id: 'astronaut', nameKey: 'c_astronaut', price: 800, color: '#f8fafc', weaponKey: 'w_plasma', dmg: 4, cooldown: 15, speed: 18, type: 'laser', homing: true, homingStrength: 0.05 } 
        ];

        const ACCESSORIES = [
            { id: 'none', nameKey: 'a_none', price: 0, icon: '🚫' },
            { id: 'cap', nameKey: 'a_cap', price: 100, icon: '🧢' },
            { id: 'glasses', nameKey: 'a_glasses', price: 150, icon: '🕶️' },
            { id: 'star', nameKey: 'a_star', price: 200, icon: '⭐' },
            { id: 'gloves', nameKey: 'a_gloves', price: 250, icon: '🧤' },
            { id: 'shoes', nameKey: 'a_shoes', price: 300, icon: '👟' }
        ];

        let storeTab = 'chars'; 

        // --- 全新無縫資料轉移系統 (Migration System) ---
        const FINAL_SAVE_KEY = 'YouJumpIJump_SaveData_Final'; 
        
        let playerData = {
            highScore: 0, coins: 0, extraLives: 0,
            unlockedChars: ['default'], selectedChar: 'default',
            unlockedAccs: ['none'], selectedAccs: [], 
            controlMethod: 'touch',  // 預設為觸控
            gyroSensitivity: 5.0,    // 陀螺儀預設靈敏度 5.0
            touchSensitivity: 1.0    // 觸控預設靈敏度 1.0
        };

        function migrateOldSaves() {
            let totalCoins = 0;
            let bestScore = 0;
            let totalLives = 0;
            let mergedChars = new Set();
            let mergedAccs = new Set();
            let oldSavesFound = false;

            // 尋找舊版紀錄 v1 至 v10
            for(let i=1; i<=10; i++) {
                let key = 'YouJumpIJump_SaveData_v' + i;
                let dataStr = localStorage.getItem(key);
                if (dataStr) {
                    oldSavesFound = true;
                    try {
                        let data = JSON.parse(dataStr);
                        if (data.coins) totalCoins += data.coins;
                        if (data.highScore > bestScore) bestScore = data.highScore;
                        if (data.extraLives) totalLives += data.extraLives;
                        if (data.unlockedChars) data.unlockedChars.forEach(c => mergedChars.add(c));
                        if (data.unlockedAccs) data.unlockedAccs.forEach(c => mergedAccs.add(c));
                        if (data.selectedAccs) data.selectedAccs.forEach(c => mergedAccs.add(c));
                    } catch(e) {}
                    // 剷除舊資料，保持整潔
                    localStorage.removeItem(key); 
                }
            }

            // 如果有舊紀錄，自動加總到 Final Key
            if (oldSavesFound) {
                let finalDataStr = localStorage.getItem(FINAL_SAVE_KEY);
                let finalData = finalDataStr ? JSON.parse(finalDataStr) : {};
                
                finalData.coins = (finalData.coins || 0) + totalCoins;
                finalData.highScore = Math.max(finalData.highScore || 0, bestScore);
                finalData.extraLives = (finalData.extraLives || 0) + totalLives;
                
                finalData.unlockedChars = finalData.unlockedChars || ['default'];
                mergedChars.forEach(c => { if (!finalData.unlockedChars.includes(c)) finalData.unlockedChars.push(c); });
                
                finalData.unlockedAccs = finalData.unlockedAccs || ['none'];
                mergedAccs.forEach(c => { if (!finalData.unlockedAccs.includes(c)) finalData.unlockedAccs.push(c); });

                localStorage.setItem(FINAL_SAVE_KEY, JSON.stringify(finalData));
            }
        }

        function loadPlayerData() {
            migrateOldSaves(); // 載入前先執行轉移及大一統
            try {
                const savedData = localStorage.getItem(FINAL_SAVE_KEY);
                if (savedData) {
                    const parsed = JSON.parse(savedData);
                    // 防止舊存檔遺漏新屬性
                    if (!parsed.selectedAccs) parsed.selectedAccs = (parsed.selectedAcc && parsed.selectedAcc !== 'none') ? [parsed.selectedAcc] : [];
                    if (!parsed.controlMethod) parsed.controlMethod = 'touch';
                    if (parsed.gyroSensitivity === undefined) parsed.gyroSensitivity = 5.0; 
                    if (parsed.touchSensitivity === undefined) parsed.touchSensitivity = 1.0;
                    
                    playerData = { ...playerData, ...parsed };
                }
            } catch (e) { console.error("Error loading data:", e); }
            updateStoreUI();
            updateSettingsUI();
        }

        function savePlayerData() {
            try { localStorage.setItem(FINAL_SAVE_KEY, JSON.stringify(playerData)); } 
            catch (e) { console.error("Error saving data:", e); }
        }

        // --- Core Game Variables ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const CW = 400; const CH = 600; 

        let state = 'MENU'; 
        
        // 分數與層數系統
        let score = 0; 
        let floorsPassed = 0; 
        let currentStageLevel = 0;

        function shoot() {
            if (state !== 'PLAYING' || player.weaponCooldown > 0 || player.activePowerUp === 'rocket') return;
            const selected = CHARACTERS.find(c => c.id === playerData.selectedChar) || CHARACTERS[0];
            let targetEnemy = null; let minDist = Infinity;
            
            // 優先瞄準大佬
            if (boss && !boss.dead) {
                targetEnemy = boss;
            } else {
                for (let e of enemies) {
                    if (!e.dead && e.y > 0 && e.y < CH) {
                        let dist = Math.hypot((e.x + e.width/2) - (player.x + player.width/2), (e.y + e.height/2) - player.y);
                        if (dist < minDist) { minDist = dist; targetEnemy = e; }
                    }
                }
            }

            player.weaponCooldown = targetEnemy ? selected.cooldown * 0.5 : selected.cooldown;
            let vx = 0; let vy = -selected.speed;
            if (targetEnemy) {
                let dx = (targetEnemy.x + targetEnemy.width/2) - (player.x + player.width/2);
                let dy = (targetEnemy.y + targetEnemy.height/2) - player.y;
                let angle = Math.atan2(dy, dx);
                vx = Math.cos(angle) * selected.speed; vy = Math.sin(angle) * selected.speed;
                if (vy > -2) vy = -2;
            }
            
            // 基礎攻擊力 + 額外獎勵攻擊力
            let totalDmg = selected.dmg + bonusDmg;
            
            projectiles.push({ 
                x: player.x + player.width / 2, 
                y: player.y, 
                vx: vx, 
                vy: vy, 
                dead: false, 
                weapon: { ...selected, dmg: totalDmg }, // 複製並覆蓋攻擊力
                target: targetEnemy, 
                isEnemy: false 
            });
            player.shootTimer = 15;
            
            if (selected.id === 'flyer' && player.activePowerUp !== 'rocket') doJump(player.jumpPower * 0.9);
        }

        function handleOrientation(event) {
            if (playerData.controlMethod !== 'gyro') { tiltActive = false; tiltVx = 0; return; }
            let gamma = event.gamma; if (gamma === null) return; tiltActive = true;
            
            let sens = parseFloat(playerData.gyroSensitivity) || 5.0;
            let rawGamma = gamma;
            if (rawGamma > 45) rawGamma = 45; 
            if (rawGamma < -45) rawGamma = -45;
            if (Math.abs(rawGamma) < 1.5) rawGamma = 0; 
            
            let targetVx = (rawGamma / 30) * player.speed * sens;
            if (targetVx > 22) targetVx = 22;
            if (targetVx < -22) targetVx = -22;
            
            tiltVx = targetVx;
        }

        async function requestGyroPermission() {

                catch (error) { console.log("Gyro permission rejected"); }
            } else { window.addEventListener('deviceorientation', handleOrientation); }

        // --- Classes & Gameplay ---
        class Platform {
            constructor(x, y, type) {
                this.x = x; this.y = y; this.width = 60; this.height = 12;
                this.type = type; 
                this.scored = false; this.broken = false;
                this.vx = (type === 1 || type === 3) ? (Math.random() > 0.5 ? 2 : -2) : 0;
                this.itemType = 0; this.crackLevel = 0; this.brokenTimer = 0; this.alpha = 1;       
            }
        }

        class Enemy {
            constructor(x, y) {
                this.x = x; this.y = y; this.width = 40; this.height = 30; this.dead = false;
                this.type = Math.floor(Math.random() * 2); 
                this.vx = this.type === 1 ? (Math.random() > 0.5 ? 1 : -1) : 0;
                
                // 普通怪血量隨機為 2 或 4
                this.maxHp = Math.random() > 0.5 ? 2 : 4; 
                this.hp = this.maxHp;
            }
        }

        class FloatingText { constructor(x, y, text) { this.x = x; this.y = y; this.text = text; this.alpha = 1; this.vy = -1; } }
        class InvincibilityStar {
            constructor(x, y) {
                this.x = x; this.y = y; this.vx = (Math.random() - 0.5) * 4; this.vy = (Math.random() - 0.5) * 4;
                this.alpha = 1; this.color = ['#facc15', '#60a5fa', '#f472b6', '#4ade80'][Math.floor(Math.random()*4)];
            }
        }

            platforms = []; enemies = []; projectiles = []; decorations = []; floatingTexts = []; invincibilityStars = [];
            spawnSpringNext = false; tiltVx = 0; touchX = null;
            boss = null; nextBossFloor = 100;
            
            player.x = CW / 2 - player.width / 2; player.y = 400; player.vy = 0; player.vx = 0; player.lastDir = 1; 
            player.shootTimer = 0; player.weaponCooldown = 0; player.lives = 1; 
            player.activePowerUp = null; player.powerUpTimer = 0; player.powerUpMaxTimer = 180;
            player.invincible = 0; player.jumpPower = -11; player.isDead = false;
            player.scaleX = 1.0; player.scaleY = 1.0; player.scaleVx = 0; player.scaleVy = 0;
            
            player.accCapActive = playerData.selectedAccs.includes('cap');
            player.accGlovesActive = playerData.selectedAccs.includes('gloves');
            player.accShoesActive = playerData.selectedAccs.includes('shoes');
            player.accGlassesActive = playerData.selectedAccs.includes('glasses');
            player.accStarActive = playerData.selectedAccs.includes('star');

            for(let i=0; i<25; i++) decorations.push({ x: Math.random() * CW, y: Math.random() * CH, size: Math.random() * 2 + 1, speedY: Math.random() * 0.5 + 0.2 });
            platforms.push(new Platform(player.x - 15, 580, 0)); 
            let curY = 480; while(curY > 0) { spawnPlatform(curY); curY -= (Math.random() * 40 + 40); }
            updateHUD();
        }

        function spawnPlatform(yLevel) {
            let x = Math.random() * (CW - 60); let type = 0;
            
            // 難度根據真實層數 (floorsPassed) 調整
            if (floorsPassed > 40 && Math.random() < 0.2) type = 1; 
            else if (floorsPassed > 80 && Math.random() < 0.2) type = 2; 
            else if (floorsPassed > 120 && Math.random() < 0.15) type = 3; 
            
            let p = new Platform(x, yLevel, type);
            if (spawnSpringNext && type === 0) { p.itemType = 1; spawnSpringNext = false; } 
            else if (type === 0) { 
                let roll = Math.random();
                if (roll < 0.05) { p.itemType = 5; } 
                else if (floorsPassed > 50 && roll < 0.07) { 
                    p.itemType = 4;
                    let safeX = x > CW/2 ? x - 80 - Math.random()*50 : x + 80 + Math.random()*50;
                    if (safeX < 0) safeX = 10; if (safeX > CW - 60) safeX = CW - 70;
                    platforms.push(new Platform(safeX, yLevel + (Math.random()*20 - 10), 0));
                }
                else if (roll < 0.10) { p.itemType = 3; }
                else if (roll < 0.15) { p.itemType = 2; } 
            }
            platforms.push(p);
            
            // 降低普通怪生成機率 (原為 0.1，現為 0.01)
            if (floorsPassed > 20 && Math.random() < 0.01) enemies.push(new Enemy(Math.random() * (CW - 40), yLevel - 50));
        }

        // --- 生成百層大佬 ---
        function spawnBoss() {
            let actualLevel = currentStageLevel === 0 ? 1 : currentStageLevel;
            
            // 【難度大幅削弱】：第 1 隻大佬得 5 滴血，之後每隻多 5 滴血
            let newBossHp = 5 + (actualLevel - 1) * 5; 
            
            boss = {
                x: CW / 2 - 40,
                y: -100, // 從天而降
                width: 80,
                height: 80,
                maxHp: newBossHp,
                hp: newBossHp,
                vx: 2 + actualLevel * 0.5,
                vy: 0,
                shootTimer: 300, // 第1次發射會等好耐 (大約 5 秒)
                dead: false,
                color: ['#dc2626', '#9333ea', '#ea580c', '#2563eb'][actualLevel % 4]
            };
            
            // 建立大佬競技場 (保證玩家唔會隨機跌死)
            let arenaY = player.y > CH/2 ? player.y + 100 : CH - 50;
            if (arenaY > CH - 50) arenaY = CH - 50;
            
            platforms.push(new Platform(CW/2 - 30, arenaY, 0));
            platforms.push(new Platform(20, arenaY - 80, 0));
            platforms.push(new Platform(CW - 80, arenaY - 80, 0));
            platforms.push(new Platform(CW/2 - 30, arenaY - 160, 1)); // 中間一塊識郁嘅
            
            spawnScoreText(CW/2, CH/2, "⚠️ BOSS APPROACHING ⚠️");
        }

        // --- 擊敗大佬並修正下個大佬生成時機 ---
        function killBoss() {
            boss.dead = true;
            
            // 獎勵金幣及分數
            let coinReward = 50 + currentStageLevel * 20;
            score += 50; 
            playerData.coins += coinReward; 
            
            // 擊敗大佬永久增加本局攻擊力
            bonusDmg += 2;
            
            updateHUD();
            
            // 精確設定下一個大佬觸發層數 (例如打完 100 層，下隻就是 200 層)
            nextBossFloor += 100;
            
            spawnScoreText(boss.x + boss.width/2, boss.y, `大佬KO！攻擊力+2！`);
            for(let i=0; i<30; i++) invincibilityStars.push(new InvincibilityStar(boss.x+boss.width/2, boss.y+boss.height/2));
            
            // 擊殺後生成一條新道路畀玩家繼續上
            let startY = boss.y;
            platforms.push(new Platform(CW/2 - 30, startY + 80, 0)); 
            platforms.push(new Platform(CW/2 - 80, startY + 10, 0));
            platforms.push(new Platform(CW/2 + 20, startY - 60, 0));
            
            boss = null;
        }

        function activatePowerUp(type) {
            player.activePowerUp = type; 
            let duration = 180; // 3 secs
            if (type === 'shoes' && player.accShoesActive) duration = 300; // 5 secs
            if (type === 'rocket' && playerData.selectedChar === 'astronaut') duration = 300; // 5 secs
            
            player.powerUpMaxTimer = duration;
            player.powerUpTimer = duration; 
            if (type === 'shoes') player.jumpPower = -16;
        }

        function takeDamage() {
            if (player.activePowerUp === 'rocket' || player.invincible > 0 || state === 'DYING' || state === 'REVIVE') return; 
            player.lives--;
            if (player.lives <= 0) { 
                state = 'REVIVE'; switchState('REVIVE');
            } 
            else { 
                doJump(-18); player.invincible = 90; 
                if (player.y > CH) { player.y = CH / 2; player.x = CW / 2 - player.width / 2; platforms.push(new Platform(CW/2 - 30, CH/2 + 50, 0)); } 
                updateHUD(); 
            }
        }

        function spawnScoreText(x, y, text) { floatingTexts.push(new FloatingText(x, y, text)); }
        function spawnInvincibilityStars(x, y) { for(let i=0; i<3; i++) invincibilityStars.push(new InvincibilityStar(x, y)); }

        function updateHUD() {
            document.getElementById('hud-score').innerText = score;
            document.getElementById('hud-coins').innerText = playerData.coins;
            
            let hearts = ""; 
            for(let i=0; i<3; i++) { hearts += (i < player.lives) ? svgHeartOn : svgHeartOff; }
            document.getElementById('hud-lives').innerHTML = hearts;
        }

        // --- Rendering ---
        function drawStaticBackground() {
            let stageIdx = currentStageLevel % 4;
            
            // 畫背景色
            if (stageIdx === 0) { ctx.fillStyle = '#f0fdf4'; ctx.fillRect(0, 0, CW, CH); ctx.strokeStyle = '#dcfce7'; ctx.lineWidth = 1; for(let i=0; i<CW; i+=20) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,CH); ctx.stroke(); } for(let i=0; i<CH; i+=20) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(CW,i); ctx.stroke(); } } 
            else if (stageIdx === 1) { ctx.fillStyle = '#e0f2fe'; ctx.fillRect(0, 0, CW, CH); } 
            else if (stageIdx === 2) { ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, CW, CH); } 
            else { ctx.fillStyle = '#450a0a'; ctx.fillRect(0, 0, CW, CH); }

            // 畫出巨大嘅背景層數浮水印
            ctx.save();
            ctx.fillStyle = (stageIdx === 2 || stageIdx === 3) ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
            ctx.font = '900 100px "Segoe UI", sans-serif'; // 字體縮細至 100px
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(floorsPassed + "F", CW / 2, CH / 2 + 50); // 移除數字與 F 之間嘅空格
            ctx.restore();
        }

        function drawDecorations() {
            let stageIdx = currentStageLevel % 4;
            for (let d of decorations) {
                ctx.save(); ctx.translate(d.x, d.y);
                if (stageIdx === 0) { ctx.fillStyle = '#86efac'; ctx.beginPath(); ctx.moveTo(0, 10); ctx.quadraticCurveTo(2, 0, 4, 10); ctx.moveTo(3, 10); ctx.quadraticCurveTo(6, -5, 8, 10); ctx.moveTo(6, 10); ctx.quadraticCurveTo(10, 2, 12, 10); ctx.fill(); } 
                else if (stageIdx === 1) { ctx.fillStyle = 'rgba(255, 255, 255, 0.7)'; ctx.beginPath(); ctx.arc(0, 0, d.size * 6, 0, Math.PI*2); ctx.arc(d.size * 5, -d.size * 3, d.size * 5, 0, Math.PI*2); ctx.arc(d.size * 10, 0, d.size * 6, 0, Math.PI*2); ctx.fill(); } 
                else if (stageIdx === 2) { ctx.fillStyle = 'rgba(255, 255, 255, ' + (Math.random()*0.5 + 0.5) + ')'; ctx.beginPath(); ctx.arc(0, 0, d.size, 0, Math.PI*2); ctx.fill(); } 
                else if (stageIdx === 3) { ctx.fillStyle = Math.random() > 0.5 ? '#f97316' : '#facc15'; ctx.globalAlpha = Math.random() * 0.5 + 0.5; ctx.fillRect(0, 0, d.size * 2, d.size * 2); }
                ctx.restore();
            }
        }

        function drawPlayer() {
            ctx.save(); 
            // 為咗 Squash & Stretch 從底部進行縮放
            ctx.translate(player.x + player.width/2, player.y + player.height);
            ctx.scale(player.scaleX, player.scaleY);
            ctx.translate(0, -player.height/2); // 變回以中心繪製

            if (player.invincible > 0 && Math.floor(Date.now() / 100) % 2 === 0) ctx.globalAlpha = 0.5;

            const selected = CHARACTERS.find(c => c.id === playerData.selectedChar) || CHARACTERS[0];
            if (Math.abs(player.vx) > 0.1) player.lastDir = player.vx > 0 ? 1 : -1;
            let dir = player.lastDir; let isJumping = player.vy < 0;
            const hasLegs = !['ghost', 'slime'].includes(selected.id);

            if (player.activePowerUp === 'rocket' && !player.isDead) {
                ctx.fillStyle = '#ef4444'; ctx.fillRect(dir === 1 ? -20 : 5, -10, 15, 25);
                ctx.fillStyle = 'white'; ctx.beginPath(); ctx.moveTo(dir === 1 ? -20 : 5, -10); ctx.lineTo(dir === 1 ? -5 : 20, -10); ctx.lineTo(dir === 1 ? -12.5 : 12.5, -25); ctx.fill();
                ctx.fillStyle = '#facc15'; ctx.beginPath(); ctx.moveTo(dir === 1 ? -20 : 5, 15); ctx.lineTo(dir === 1 ? -5 : 20, 15); ctx.lineTo(dir === 1 ? -12.5 : 12.5, 25 + Math.random()*10); ctx.fill();
            }

            if (selected.id === 'flyer') { ctx.fillStyle = '#bae6fd'; ctx.beginPath(); ctx.ellipse(-12, -2, 6, 12, -Math.PI/6, 0, Math.PI*2); ctx.ellipse(12, -2, 6, 12, Math.PI/6, 0, Math.PI*2); ctx.fill(); }

            if (hasLegs) {
                ctx.strokeStyle = selected.color; ctx.lineWidth = 4; ctx.lineCap = 'round'; const legXs = [-10, -3, 4, 11];
                for (let i = 0; i < 4; i++) {
                    ctx.beginPath(); ctx.moveTo(legXs[i], player.height/2 - 4);
                    
                    let targetY = isJumping ? player.height/2 + 2 : player.height/2 + 10; 
                    let targetX = isJumping ? legXs[i] + (i - 1.5) * 4 : legXs[i];
                    
                    if (player.isDead) { targetY = player.height/2 - 6; targetX = legXs[i] + (i - 1.5) * 10; }

                    ctx.lineTo(targetX, targetY); ctx.stroke();
                    if (player.activePowerUp === 'shoes' && !player.isDead) {
                        ctx.fillStyle = '#9ca3af'; ctx.fillRect(targetX - 3, targetY, 6, 4);
                        ctx.strokeStyle = '#4b5563'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(targetX-2, targetY+4); ctx.lineTo(targetX+2, targetY+6); ctx.lineTo(targetX-2, targetY+8); ctx.stroke();
                    }
                    
                    if (player.accShoesActive && !player.isDead && player.activePowerUp !== 'shoes') {
                        ctx.fillStyle = '#ef4444'; ctx.fillRect(targetX - 4, targetY - 2, 8, 4);
                        ctx.fillStyle = 'white'; ctx.fillRect(targetX + (dir===1? 2:-4), targetY - 2, 2, 4);
                    }
                }
            }

            ctx.fillStyle = selected.color;
            if (selected.id === 'ghost') { ctx.beginPath(); ctx.arc(0, 0, player.width/2, Math.PI, 0); ctx.lineTo(player.width/2, player.height/2); ctx.lineTo(0, player.height/2 + 5); ctx.lineTo(-player.width/2, player.height/2); ctx.fill(); } 
            else if (selected.id === 'slime') { ctx.beginPath(); ctx.arc(0, 5, player.width/2, Math.PI, 0); ctx.fillRect(-player.width/2, 5, player.width, 10); ctx.fill(); } 
            else if (selected.id === 'pinky') { ctx.beginPath(); ctx.arc(0, 0, player.width/2, 0, Math.PI*2); ctx.fill(); } 
            else { 
                ctx.beginPath(); ctx.roundRect(-player.width/2, -player.height/2, player.width, player.height, 10); ctx.fill(); 
                if (selected.id === 'astronaut') {
                    ctx.strokeStyle = '#9ca3af'; ctx.lineWidth = 2; ctx.stroke();
                    ctx.fillStyle = '#38bdf8'; 
                    ctx.fillRect(dir === 1 ? 2 : -12, -8, 10, 10);
                    ctx.fillStyle = 'rgba(255,255,255,0.5)'; 
                    ctx.fillRect(dir === 1 ? 4 : -10, -6, 3, 3);
                }
            }

            if (hasLegs) { ctx.beginPath(); if (player.shootTimer > 0 && !player.isDead) ctx.roundRect(-4, -18, 8, 12, 4); else ctx.roundRect(dir === 1 ? 5 : -20, -5, 15, 10, 5); ctx.fill(); }

            if (selected.id === 'ninja') { ctx.fillStyle = '#dc2626'; ctx.fillRect(-player.width/2, -8, player.width, 4); ctx.fillRect(dir === 1 ? -player.width/2 - 6 : player.width/2, -8, 6, 2); }
            if (selected.id === 'cyborg') { ctx.fillStyle = '#94a3b8'; ctx.fillRect(dir === 1 ? -15 : 0, -15, 15, 15); }
            if (selected.id === 'gold') { ctx.fillStyle = '#facc15'; ctx.beginPath(); ctx.moveTo(-10, -15); ctx.lineTo(10, -15); ctx.lineTo(15, -25); ctx.lineTo(5, -15); ctx.lineTo(0, -25); ctx.lineTo(-5, -15); ctx.lineTo(-15, -25); ctx.closePath(); ctx.fill(); }

            if (player.accCapActive) { ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.arc(0, -15, 12, Math.PI, 0); ctx.fill(); ctx.fillRect(dir === 1 ? 0 : -15, -15, 15, 3); } 
            if (player.accStarActive) { ctx.fillStyle = '#facc15'; let sx = dir === 1 ? -8 : 8; ctx.beginPath(); ctx.moveTo(sx, -18); ctx.lineTo(sx+3, -12); ctx.lineTo(sx+9, -12); ctx.lineTo(sx+4, -8); ctx.lineTo(sx+6, -2); ctx.lineTo(sx, -6); ctx.lineTo(sx-6, -2); ctx.lineTo(sx-4, -8); ctx.lineTo(sx-9, -12); ctx.lineTo(sx-3, -12); ctx.closePath(); ctx.fill(); }

            ctx.fillStyle = 'white'; let eyeOffsetX = dir === 1 ? 4 : -10; if (player.shootTimer > 0 && !player.isDead) eyeOffsetX = -3; 
            
            if (player.accGlassesActive && !player.isDead) {
                ctx.fillStyle = '#111827'; ctx.fillRect(-6 + eyeOffsetX, -8, 8, 6); ctx.fillRect(2 + eyeOffsetX, -8, 8, 6); ctx.fillRect(-2 + eyeOffsetX, -6, 8, 2); 
                ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fillRect(-4 + eyeOffsetX, -7, 2, 4); ctx.fillRect(4 + eyeOffsetX, -7, 2, 4);
            } else if (selected.id !== 'astronaut') {
                ctx.fillStyle = 'white';
                ctx.fillRect(-4 + eyeOffsetX, -8, 6, 8); if (selected.id !== 'cyborg') ctx.fillRect(4 + eyeOffsetX, -8, 6, 8);
                
                if (player.isDead) {
                    ctx.strokeStyle = 'black'; ctx.lineWidth = 1.5; ctx.lineCap = 'round'; ctx.beginPath();
                    ctx.moveTo(-3 + eyeOffsetX, -7); ctx.lineTo(-1 + eyeOffsetX, -3); ctx.moveTo(-1 + eyeOffsetX, -7); ctx.lineTo(-3 + eyeOffsetX, -3);
                    if (selected.id !== 'cyborg') { ctx.moveTo(5 + eyeOffsetX, -7); ctx.lineTo(7 + eyeOffsetX, -3); ctx.moveTo(7 + eyeOffsetX, -7); ctx.lineTo(5 + eyeOffsetX, -3); }
                    ctx.stroke();
                    if (selected.id === 'cyborg') { ctx.strokeStyle = '#7f1d1d'; ctx.beginPath(); ctx.moveTo(5 + eyeOffsetX, -6); ctx.lineTo(7 + eyeOffsetX, -4); ctx.moveTo(7 + eyeOffsetX, -6); ctx.lineTo(5 + eyeOffsetX, -4); ctx.stroke(); }
                } else {
                    if (selected.id === 'cyborg') { ctx.fillStyle = 'red'; ctx.fillRect(-2 + eyeOffsetX, -5, 4, 4); } 
                    else { ctx.fillStyle = 'black'; ctx.fillRect(-2 + eyeOffsetX, -6, 2, 4); ctx.fillRect(6 + eyeOffsetX, -6, 2, 4); }
                }
            } else if (selected.id === 'astronaut' && player.isDead) {
                 ctx.strokeStyle = 'rgba(0,0,0,0.7)'; ctx.lineWidth = 1.5; ctx.lineCap = 'round'; ctx.beginPath();
                 let vx = dir === 1 ? 5 : -5;
                 ctx.moveTo(-1 + vx, -7); ctx.lineTo(1 + vx, -3); ctx.moveTo(1 + vx, -7); ctx.lineTo(-1 + vx, -3);
                 ctx.moveTo(3 + vx, -7); ctx.lineTo(5 + vx, -3); ctx.moveTo(5 + vx, -7); ctx.lineTo(3 + vx, -3);
                 ctx.stroke();
            }

            if (player.accGlovesActive && hasLegs && !player.isDead) { 
                ctx.fillStyle = 'white'; 
                if (player.shootTimer > 0) ctx.fillRect(-4, -20, 8, 4); else ctx.fillRect(dir === 1 ? 15 : -20, -5, 5, 10); 
            }

            if (player.powerUpTimer > 0 && !player.isDead) {
                ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.fillRect(-15, -35, 30, 4);
                ctx.fillStyle = player.activePowerUp === 'rocket' ? '#ef4444' : '#3b82f6'; ctx.fillRect(-15, -35, 30 * (player.powerUpTimer/player.powerUpMaxTimer), 4);
            }
            ctx.restore();

        function drawBoss() {
            if (!boss || boss.dead) return;
            ctx.save();
            ctx.translate(boss.x + boss.width/2, boss.y + boss.height/2);

            let wobble = Math.sin(Date.now() / 150) * 5;
            ctx.rotate(wobble * Math.PI / 180);

            // 身體
            ctx.fillStyle = boss.color;
            ctx.beginPath(); ctx.roundRect(-boss.width/2, -boss.height/2, boss.width, boss.height, 15); ctx.fill();

            // 王冠
            ctx.fillStyle = '#facc15';
            ctx.beginPath();
            ctx.moveTo(-25, -boss.height/2); ctx.lineTo(-35, -boss.height/2 - 25);
            ctx.lineTo(-12, -boss.height/2 - 10); ctx.lineTo(0, -boss.height/2 - 30);
            ctx.lineTo(12, -boss.height/2 - 10); ctx.lineTo(35, -boss.height/2 - 25);
            ctx.lineTo(25, -boss.height/2); ctx.fill();

            // 眼睛
            ctx.fillStyle = 'white'; ctx.fillRect(-25, -15, 20, 20); ctx.fillRect(5, -15, 20, 20);
            ctx.fillStyle = '#ef4444'; ctx.fillRect(-15, -8, 10, 10); ctx.fillRect(5, -8, 10, 10);

            // 憤怒眉毛
            ctx.fillStyle = '#111827';
            ctx.beginPath(); ctx.moveTo(-30, -20); ctx.lineTo(-5, -5); ctx.lineTo(-5, -10); ctx.lineTo(-30, -25); ctx.fill();
            ctx.beginPath(); ctx.moveTo(30, -20); ctx.lineTo(5, -5); ctx.lineTo(5, -10); ctx.lineTo(30, -25); ctx.fill();

            // 血條
            let hpPct = Math.max(0, boss.hp / boss.maxHp);
            ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(-boss.width/2, -boss.height/2 - 40, boss.width, 8);
            ctx.fillStyle = '#ef4444'; ctx.fillRect(-boss.width/2 + 1, -boss.height/2 - 39, boss.width - 2, 6);
            ctx.fillStyle = '#22c55e'; ctx.fillRect(-boss.width/2 + 1, -boss.height/2 - 39, (boss.width - 2) * hpPct, 6);

            ctx.restore();
        }

        function drawPlatformsAndItems() {
            for (let p of platforms) {
                if (p.broken && p.brokenTimer > 0) continue;
                ctx.save(); ctx.globalAlpha = p.alpha; 
                ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(p.x + 2, p.y + 4, p.width, p.height);

                if (p.type === 0) ctx.fillStyle = '#22c55e'; 
                else if (p.type === 1) ctx.fillStyle = '#3b82f6'; 
                else if (p.type === 2) ctx.fillStyle = '#f97316'; 
                else if (p.type === 3) ctx.fillStyle = '#a855f7'; 
                
                ctx.beginPath(); ctx.roundRect(p.x, p.y, p.width, p.height, 4); ctx.fill();

                if (p.type === 3 && p.crackLevel > 0) {
                    ctx.strokeStyle = '#111827'; ctx.lineWidth = 1.5; ctx.beginPath();
                    if (p.crackLevel >= 1) { ctx.moveTo(p.x+10, p.y); ctx.lineTo(p.x+15, p.y+6); ctx.lineTo(p.x+12, p.y+12); }
                    if (p.crackLevel >= 2) { ctx.moveTo(p.x+40, p.y); ctx.lineTo(p.x+35, p.y+8); ctx.lineTo(p.x+45, p.y+12); ctx.moveTo(p.x+25, p.y+6); ctx.lineTo(p.x+30, p.y+12); }
                    ctx.stroke();
                }

                if (!p.broken) {
                    let cx = p.x + p.width/2; let cy = p.y;
                    if (p.itemType === 1) { ctx.fillStyle = '#9ca3af'; ctx.fillRect(cx - 8, cy - 12, 16, 12); ctx.fillStyle = '#4b5563'; ctx.fillRect(cx - 6, cy - 10, 12, 2); ctx.fillRect(cx - 6, cy - 6, 12, 2); } 
                    else if (p.itemType === 2) { ctx.fillStyle = '#ef4444'; ctx.fillRect(cx - 8, cy - 8, 6, 8); ctx.fillRect(cx + 2, cy - 8, 6, 8); ctx.strokeStyle = '#4b5563'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(cx-5, cy-8); ctx.lineTo(cx-5, cy-12); ctx.moveTo(cx+5, cy-8); ctx.lineTo(cx+5, cy-12); ctx.stroke(); } 
                    else if (p.itemType === 3) { ctx.fillStyle = 'white'; ctx.fillRect(cx - 6, cy - 18, 12, 18); ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.moveTo(cx-6, cy-18); ctx.lineTo(cx+6, cy-18); ctx.lineTo(cx, cy-28); ctx.fill(); } 
                    else if (p.itemType === 4) { 
                        ctx.fillStyle = '#1f2937'; ctx.beginPath(); ctx.arc(cx, cy - 10, 8, 0, Math.PI*2); ctx.fill(); 
                        ctx.strokeStyle = 'white'; ctx.lineWidth = 1.5; ctx.stroke(); 
                        ctx.strokeStyle = '#f97316'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(cx, cy-18); ctx.quadraticCurveTo(cx+5, cy-22, cx+8, cy-18); ctx.stroke(); 
                    } 
                    else if (p.itemType === 5) { ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.moveTo(cx, cy-5); ctx.bezierCurveTo(cx-8, cy-12, cx-8, cy-20, cx, cy-18); ctx.bezierCurveTo(cx+8, cy-20, cx+8, cy-12, cx, cy-5); ctx.fill(); }
                }
                ctx.restore();
            }
        }

        function drawEnemies() {
            for (let e of enemies) {
                if (e.dead) continue;
                ctx.save(); ctx.translate(e.x + e.width/2, e.y + e.height/2);
                ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.arc(0, 0, e.width/2, 0, Math.PI*2); ctx.fill();
                for(let i=0; i<3; i++) { ctx.beginPath(); ctx.moveTo(-10 + i*10, e.height/2 - 5); ctx.lineTo(-5 + i*10, e.height/2 + 8); ctx.lineTo(0 + i*10, e.height/2 - 5); ctx.fill(); }
                ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(0, -3, 8, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(0, -3, 3, 0, Math.PI*2); ctx.fill();
                let hpPct = Math.max(0, e.hp / e.maxHp);
                ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(-16, -22, 32, 6); ctx.fillStyle = '#ef4444'; ctx.fillRect(-15, -21, 30, 4); ctx.fillStyle = '#22c55e'; ctx.fillRect(-15, -21, 30 * hpPct, 4);
                ctx.restore();
            }
        }

        function drawProjectiles() {
            for (let p of projectiles) {
                if (p.dead) continue;
                ctx.save(); ctx.translate(p.x, p.y);
                
                if (p.weapon.type === 'boss_fire') {
                    ctx.fillStyle = '#ea580c'; ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#facc15'; ctx.beginPath(); ctx.arc(0, 2, 4, 0, Math.PI*2); ctx.fill();
                }
                else if (p.weapon.type === 'shuriken') { p.rot = (p.rot || 0) + 0.3; ctx.rotate(p.rot); ctx.fillStyle = '#4b5563'; ctx.fillRect(-6, -2, 12, 4); ctx.fillRect(-2, -6, 4, 12); } 
                else if (p.weapon.type === 'laser') { ctx.fillStyle = '#ef4444'; ctx.rotate(Math.atan2(p.vy, p.vx)); ctx.fillRect(-8, -2, 16, 4); } 
                else if (p.weapon.type === 'heart') { ctx.fillStyle = '#ec4899'; ctx.beginPath(); ctx.moveTo(0, 3); ctx.bezierCurveTo(-5, -2, -5, -6, 0, -5); ctx.bezierCurveTo(5, -6, 5, -2, 0, 3); ctx.fill(); } 
                else if (p.weapon.type === 'acid') { ctx.fillStyle = '#10b981'; ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI*2); ctx.fill(); } 
                else if (p.weapon.type === 'gold') { ctx.fillStyle = '#eab308'; ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle = '#ca8a04'; ctx.lineWidth=2; ctx.stroke(); } 
                else if (p.weapon.type === 'orb') { ctx.fillStyle = 'rgba(168, 85, 247, 0.8)'; ctx.beginPath(); ctx.arc(0, 0, 7, 0, Math.PI*2); ctx.fill(); } 
                else if (p.weapon.type === 'wind') { ctx.fillStyle = 'rgba(255, 255, 255, 0.8)'; ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI*2); ctx.fill(); } 
                else { ctx.fillStyle = '#38bdf8'; ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur=10; ctx.shadowColor='#38bdf8'; ctx.fill(); } 
                ctx.restore();
            }
        }

        function drawFloatingTexts() {
            for (let ft of floatingTexts) {
                ctx.save(); ctx.globalAlpha = ft.alpha; ctx.fillStyle = '#eab308'; ctx.font = 'bold 24px "Segoe UI", sans-serif'; ctx.textAlign = 'center'; ctx.strokeStyle = 'white'; ctx.lineWidth = 3;
                ctx.strokeText(ft.text, ft.x, ft.y); ctx.fillText(ft.text, ft.x, ft.y); ctx.restore();
            }
        }

        function drawInvincibilityStars() {
            for (let s of invincibilityStars) {
                ctx.save(); ctx.globalAlpha = s.alpha; ctx.fillStyle = s.color;
                ctx.translate(s.x, s.y);
                ctx.beginPath(); ctx.moveTo(0, -6); ctx.lineTo(2, -2); ctx.lineTo(6, -2); ctx.lineTo(3, 1); ctx.lineTo(4, 5); ctx.lineTo(0, 3); ctx.lineTo(-4, 5); ctx.lineTo(-3, 1); ctx.lineTo(-6, -2); ctx.lineTo(-2, -2); ctx.closePath(); ctx.fill();
                ctx.restore();
            }
        }

        // --- Main Game Loop ---
        function gameLoop() {
            if (state !== 'PLAYING' && state !== 'DYING') return;

            if (state === 'DYING') {
                player.vy += player.gravity; 
                player.y += player.vy;
                
                for (let ft of floatingTexts) { ft.y += ft.vy; ft.alpha -= 0.02; }
                floatingTexts = floatingTexts.filter(ft => ft.alpha > 0);
                for (let s of invincibilityStars) { s.x += s.vx; s.y += s.vy; s.alpha -= 0.05; }
                invincibilityStars = invincibilityStars.filter(s => s.alpha > 0);

                ctx.clearRect(0, 0, CW, CH);
                drawStaticBackground(); drawDecorations(); drawPlatformsAndItems(); drawEnemies(); drawBoss(); drawProjectiles(); drawPlayer(); drawInvincibilityStars(); drawFloatingTexts(); 

                if (player.vy >= 0) {
                    if (score > playerData.highScore) playerData.highScore = score; 
                    savePlayerData(); 
                    switchState('GAMEOVER');
                    return; 
                }
                animationId = requestAnimationFrame(gameLoop);
                return;
            }

            // --- 正常遊玩邏輯區 ---
            
            // Squash & Stretch 物理更新
            player.scaleVx += (1.0 - player.scaleX) * 0.3; // 彈力係數
            player.scaleVy += (1.0 - player.scaleY) * 0.3;
            player.scaleVx *= 0.75; // 阻尼
            player.scaleVy *= 0.75;
            player.scaleX += player.scaleVx;
            player.scaleY += player.scaleVy;

            if (player.shootTimer > 0) player.shootTimer--;
            if (player.weaponCooldown > 0) player.weaponCooldown--;
            if (player.invincible > 0) player.invincible--;

            if (player.powerUpTimer > 0) {
                player.powerUpTimer--;
                if (player.activePowerUp === 'rocket') player.vy = -15; 
                if (player.powerUpTimer <= 0) { player.activePowerUp = null; player.jumpPower = -11; }
            }

            if (player.activePowerUp === 'rocket' || player.invincible > 0) {
                if (Math.random() < 0.5) spawnInvincibilityStars(player.x + player.width/2, player.y + player.height/2);
            }

            for (let s of invincibilityStars) { s.x += s.vx; s.y += s.vy; s.alpha -= 0.05; }
            invincibilityStars = invincibilityStars.filter(s => s.alpha > 0);

            if (enemies.some(e => !e.dead && e.y > 0 && e.y < CH) || (boss && !boss.dead)) shoot();

            for (let d of decorations) {
                let stageIdx = currentStageLevel % 4;
                if (stageIdx === 3) d.y -= d.speedY * 2; 
                if (d.y > CH + 50) { d.y = -50; d.x = Math.random() * CW; } else if (d.y < -50) { d.y = CH + 50; d.x = Math.random() * CW; }
            }

            for (let ft of floatingTexts) { ft.y += ft.vy; ft.alpha -= 0.02; }
            floatingTexts = floatingTexts.filter(ft => ft.alpha > 0);

            for(let p of platforms) {
                if (p.broken) {
                    if (p.brokenTimer > 0) p.brokenTimer--;
                    if (p.brokenTimer <= 0) { p.broken = false; p.crackLevel = 0; p.alpha = 0; }
                } else if (p.alpha < 1) {
                    p.alpha += 0.05; if (p.alpha > 1) p.alpha = 1;
                }
                if (p.type === 1 || p.type === 3) { p.x += p.vx; if (p.x < 0 || p.x + p.width > CW) p.vx *= -1; }
            }

            if (player.activePowerUp !== 'rocket') {
                player.vy += player.gravity; if (player.vy > player.maxFallSpeed) player.vy = player.maxFallSpeed;
            }

            // Apply selected control method
            if (playerData.controlMethod === 'gyro' && tiltActive && tiltVx !== 0) {
                player.vx = tiltVx;
            } else if (playerData.controlMethod === 'touch' && touchX !== null) {
                let sens = parseFloat(playerData.touchSensitivity) || 1.0;
                let currentTouchSpeed = player.speed * sens;
                if (currentTouchSpeed > 25) currentTouchSpeed = 25; 
                
                if (touchX < CW / 2) player.vx = -currentTouchSpeed;
                else player.vx = currentTouchSpeed;
            } else if (keys.left) {
                let sens = parseFloat(playerData.touchSensitivity) || 1.0;
                player.vx = -player.speed * sens;
            } else if (keys.right) {
                let sens = parseFloat(playerData.touchSensitivity) || 1.0;
                player.vx = player.speed * sens;
            } else { 
                player.vx *= 0.8; if (Math.abs(player.vx) < 0.1) player.vx = 0; 
            }

            player.x += player.vx; player.y += player.vy;
            if (player.x + player.width < 0) player.x = CW; else if (player.x > CW) player.x = -player.width;

            // --- 防治打大佬時飛出天花板 ---
            if (boss && !boss.dead && player.y < 0) {
                player.y = 0;
                if (player.vy < 0) player.vy = 0; // 撞到天花板反彈或者停止
                if (player.activePowerUp === 'rocket') {
                    // 如果係火箭飛過龍，強制解除，等玩家跌返落去打大佬
                    player.activePowerUp = null;
                    player.powerUpTimer = 0;
                }
            }

            // --- BOSS 更新邏輯 ---
            if (boss && !boss.dead) {
                if (boss.y < 50) boss.y += 2; // 入場
                boss.x += boss.vx;
                if (boss.x < 0 || boss.x + boss.width > CW) boss.vx *= -1;

                boss.shootTimer--;
                if (boss.shootTimer <= 0) {
                    // 【難度大幅削弱】：發射速度減慢 10 倍
                    let actualLevel = currentStageLevel === 0 ? 1 : currentStageLevel;
                    boss.shootTimer = Math.max(200, 600 - actualLevel * 50);
                    
                    let dx = (player.x + player.width/2) - (boss.x + boss.width/2);
                    let dy = (player.y + player.height/2) - (boss.y + boss.height);
                    let dist = Math.hypot(dx, dy) || 1;
                    
                    // 子彈飛行速度都減慢少少
                    let speed = 2 + (actualLevel % 2);
                    projectiles.push({
                        x: boss.x + boss.width/2,
                        y: boss.y + boss.height,
                        vx: (dx/dist)*speed,
                        vy: (dy/dist)*speed,
                        dead: false,
                        isEnemy: true,
                        weapon: { type: 'boss_fire', dmg: 1 }
                    });
                }

                // 玩家與大佬嘅碰撞 (踩 vs 受傷 vs 火箭)
                if (player.x + player.width > boss.x && player.x < boss.x + boss.width && player.y + player.height > boss.y && player.y < boss.y + boss.height) {
                    
                    if (player.activePowerUp === 'rocket') {
                        // 火箭直衝大佬：造成大傷害、反彈並解除火箭狀態
                        boss.hp -= 20;
                        doJump(player.jumpPower * 1.2); 
                        player.activePowerUp = null; 
                        player.powerUpTimer = 0;
                        player.invincible = 60; // 防止撞完即刻扣血
                        spawnScoreText(boss.x + boss.width/2, boss.y, `火箭重擊! -20`);
                    } 
                    else if (player.vy > 0 && player.y + player.height - player.vy <= boss.y + 30) {
                        // 正常由上面踩落去
                        boss.hp -= 10;
                        doJump(player.jumpPower * 1.5); // 超大回彈
                        spawnScoreText(boss.x + boss.width/2, boss.y, `-10`);
                    } 
                    else if (player.accCapActive) {
                        // 裝備咗紅帽，擋一次傷並造成少少反傷
                        player.accCapActive = false;
                        boss.hp -= 5;
                        doJump(player.jumpPower);
                        player.invincible = 60;
                        spawnScoreText(boss.x + boss.width/2, boss.y, `-5`);
                    } 
                    else if (player.invincible > 0) {
                        // 無敵狀態下碰到 (例如復活後)
                        if (player.vy > 0) {
                            boss.hp -= 5;
                            doJump(player.jumpPower);
                            spawnScoreText(boss.x + boss.width/2, boss.y, `-5`);
                        } else {
                            player.vy = Math.abs(player.jumpPower) * 0.5; // 撞到底部彈返落去，避免卡實
                        }
                    } 
                    else {
                        takeDamage();
                    }

                    if (boss.hp <= 0) killBoss();
                }
            }

            for (let p of projectiles) {
                if (p.isEnemy) {
                    if (!p.dead && player.x + player.width > p.x - 5 && player.x < p.x + 5 && player.y + player.height > p.y - 5 && player.y < p.y + 5) {
                        if (player.activePowerUp === 'rocket' || player.invincible > 0 || player.accGlovesActive) {
                            p.dead = true;
                            if (player.accGlovesActive && !player.invincible) player.accGlovesActive = false;
                        } else { p.dead = true; takeDamage(); }
                    }
                } else {
                    let target = p.weapon.homing ? ((boss && !boss.dead) ? boss : p.target) : null;
                    if (target && !target.dead) {
                        let dx = (target.x + target.width/2) - p.x; let dy = (target.y + target.height/2) - p.y; let angle = Math.atan2(dy, dx);
                        p.vx += (Math.cos(angle) * p.weapon.speed - p.vx) * p.weapon.homingStrength;
                        p.vy += (Math.sin(angle) * p.weapon.speed - p.vy) * p.weapon.homingStrength;
                    }
                }
                p.x += p.vx; p.y += p.vy;
            }
            projectiles = projectiles.filter(p => p.y > player.y - CH && p.y < CH + 100 && !p.dead);

            for (let e of enemies) { if (e.type === 1 && !e.dead) { e.x += e.vx; if (e.x < 0 || e.x + e.width > CW) e.vx *= -1; } }

            // --- 畫面向上捲動 (大佬期間會鎖定) ---
            if (player.y < CH / 2 && !boss) {
                let diff = CH / 2 - player.y; player.y = CH / 2;
                for (let d of decorations) d.y += diff * 0.4;
                for (let ft of floatingTexts) ft.y += diff; 
                for (let s of invincibilityStars) s.y += diff;
                
                for (let p of platforms) {
                    p.y += diff;
                    if (p.y > CH && !p.scored) {
                        
                        // 修正分數，每一層加1分
                        p.scored = true; 
                        score++;               // 每過一塊板加1分
                        floorsPassed++;        // 層數加1
                        playerData.coins++;    // 金幣加1
                        
                        if (floorsPassed > 0 && floorsPassed % 20 === 0) spawnSpringNext = true;
                        
                        // 根據層數更新背景級別 (每100層轉一次景)
                        currentStageLevel = Math.floor(floorsPassed / 100);
                        
                        updateHUD();
                        
                        // 檢查大佬生成條件
                        if (floorsPassed >= nextBossFloor && !boss) {
                            spawnBoss();
                        }
                    }
                }
                platforms = platforms.filter(p => p.y < CH + 50);
                for (let e of enemies) e.y += diff; enemies = enemies.filter(e => e.y < CH + 50);
                
                let minY = Math.min(...platforms.map(p => p.y));
                while (minY > -20) { 
                    // 難度隨住層數增加而變難
                    let gap = Math.random() * 40 + Math.min(floorsPassed / 3, 50) + 20; 
                    minY -= gap; 
                    spawnPlatform(minY); 
                }
            }

            for (let proj of projectiles) {
                if (proj.isEnemy) continue;
                
                // 子彈打大佬
                if (boss && !boss.dead && !proj.dead && proj.x > boss.x && proj.x < boss.x + boss.width && proj.y > boss.y && proj.y < boss.y + boss.height) {
                    boss.hp -= proj.weapon.dmg; proj.dead = true;
                    if (boss.hp <= 0) killBoss();
                }

                // 子彈打細怪
                for (let e of enemies) {
                    if (!e.dead && !proj.dead && proj.x > e.x && proj.x < e.x + e.width && proj.y > e.y && proj.y < e.y + e.height) {
                        e.hp -= proj.weapon.dmg; proj.dead = true;
                        if (e.hp <= 0) { 
                            e.dead = true; 
                            let pts = getEnemyKillScore();
                            score += pts; 
                            playerData.coins += 2; // 打死怪固定送2個金幣
                            updateHUD(); 
                            spawnScoreText(e.x + e.width/2, e.y, `+${pts}`); 
                        }
                    }
                }
            }

            for (let p of platforms) {
                if (p.itemType > 1 && !p.broken) {
                    let ix = p.x + p.width/2 - 10; let iy = p.y - 25;
                    if (player.x + player.width > ix && player.x < ix + 20 && player.y + player.height > iy && player.y < iy + 25) {
                        if (p.itemType === 2) activatePowerUp('shoes'); 
                        else if (p.itemType === 3) activatePowerUp('rocket'); 
                        else if (p.itemType === 4) { 
                            if (player.activePowerUp === 'rocket' || player.invincible > 0) {
                                p.itemType = 0; 
                                let pts = getEnemyKillScore();
                                score += pts; playerData.coins += 3; updateHUD(); spawnScoreText(ix+10, iy, `+${pts}`); 
                            } else if (player.accGlovesActive) {
                                player.accGlovesActive = false; p.itemType = 0; 
                                let pts = getEnemyKillScore();
                                score += pts; playerData.coins += 3; updateHUD(); spawnScoreText(ix+10, iy, `+${pts}`);
                            } else { takeDamage(); }
                        } else if (p.itemType === 5) { if (player.lives < 3) { player.lives++; updateHUD(); } }
                        
                        if (p.itemType !== 4 || player.invincible > 0 || player.accGlovesActive) p.itemType = 0; 
                    }
                }
            }

            for (let e of enemies) {
                if (e.dead) continue;
                if (player.x + player.width > e.x && player.x < e.x + e.width && player.y + player.height > e.y && player.y < e.y + e.height) {
                    if (player.activePowerUp === 'rocket' || player.invincible > 0) { 
                        e.hp = 0; e.dead = true; 
                        let pts = getEnemyKillScore();
                        score += pts; playerData.coins += 2; updateHUD(); spawnScoreText(e.x + e.width/2, e.y, `+${pts}`);
                    } 
                    else if (player.accCapActive) {
                        player.accCapActive = false; e.hp = 0; e.dead = true; doJump(player.jumpPower); 
                        let pts = getEnemyKillScore();
                        score += pts; playerData.coins += 2; updateHUD(); spawnScoreText(e.x + e.width/2, e.y, `+${pts}`);
                    }
                    else if (player.vy > 0 && player.y + player.height - player.vy <= e.y + 15) { 
                        e.hp -= 5; doJump(player.jumpPower); 
                        if (e.hp <= 0) { 
                            e.dead = true; 
                            let pts = getEnemyKillScore();
                            score += pts; playerData.coins += 2; updateHUD(); spawnScoreText(e.x + e.width/2, e.y, `+${pts}`); 
                        }
                    } 
                    else { takeDamage(); }
                }
            }

            if (player.vy > 0 && player.activePowerUp !== 'rocket') { 
                for (let p of platforms) {
                    if (!p.broken && player.x + player.width > p.x && player.x < p.x + p.width && player.y + player.height > p.y && player.y + player.height - player.vy <= p.y + 12) { 
                        if (p.type === 2) { p.broken = true; p.brokenTimer = 90; doJump(player.jumpPower); } 
                        else if (p.type === 3) { p.crackLevel++; doJump(player.jumpPower); if (p.crackLevel >= 3) { p.broken = true; p.brokenTimer = 90; } } 
                        else { doJump(player.jumpPower); if (p.itemType === 1 && player.x + player.width/2 > p.x + p.width/2 - 12 && player.x + player.width/2 < p.x + p.width/2 + 12) { doJump(player.springPower); } }
                    }
                }
            }

            // 大佬戰時如果有安全底層托住，跌落去就真係死
            if (player.y > CH) takeDamage();

            ctx.clearRect(0, 0, CW, CH);
            drawStaticBackground(); drawDecorations(); drawPlatformsAndItems(); drawEnemies(); drawBoss(); drawProjectiles(); drawPlayer(); drawInvincibilityStars(); drawFloatingTexts(); 

            if (state === 'PLAYING' || state === 'DYING') {
                animationId = requestAnimationFrame(gameLoop);
            }
        }

        switchState('MENU');
        updateLangUI(); 
    </script>
</body>
</html>
